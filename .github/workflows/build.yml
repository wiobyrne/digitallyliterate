# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Check for any build error

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Check .eleventyignore hasn't been reset by a template sync
      run: |
        for f in "src/site/search-index.njk" "src/site/sitemap.njk"; do
          if ! grep -qF "$f" .eleventyignore; then
            echo "::error::.eleventyignore is missing '$f'. The Digital Garden plugin's template-update PRs periodically reset this file, which un-ignores the stock Nunjucks template and collides with our custom search-index.11ty.js / sitemap.11ty.js on the same output path. Re-add the missing line(s) to .eleventyignore before merging."
            exit 1
          fi
        done
    - run: npm ci
    - run: npm run build --if-present
